                    <li><a href="../officers.html">Our Officers</a></li>

                    <li><a href="../calendar.html">Calendar</a></li>

    <div class="event-gallery-container">
        <a href="../gallery.html" class="back-link">← Back to Gallery</a>

        <!-- Event hero — filled by JS -->
        <div class="event-hero" id="event-hero">
            <div class="event-hero-icon" id="hero-icon">📷</div>
            <div class="event-hero-info">
                <h1 id="hero-title">Loading...</h1>
                <div class="meta" id="hero-meta"></div>
            </div>
        </div>

        <p class="photos-summary" id="photos-summary"></p>

        <!-- Photo grid — filled by JS -->
        <div class="photo-grid" id="photo-grid">
            <div class="no-photos">
                <span>⏳</span>
                <p>Loading photos...</p>
            </div>
        </div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox-overlay" id="lightbox" role="dialog" aria-modal="true" aria-label="Photo lightbox">
        <button class="lightbox-close" id="lb-close" aria-label="Close">✕</button>
        <button class="lightbox-nav lightbox-prev" id="lb-prev" aria-label="Previous photo">‹</button>
        <div class="lightbox-content">
            <img id="lb-img" src="" alt="Gallery photo">
        </div>
        <button class="lightbox-nav lightbox-next" id="lb-next" aria-label="Next photo">›</button>
        <div class="lightbox-counter" id="lb-counter">1 / 1</div>
    </div>

    <!-- Footer -->

                    </svg>
                </a>
                <a href="https://www.instagram.com/codecoreutep?igsh=Y2tnd2s3NWViMDA1" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
                    <svg fill="currentColor" viewBox="0 0 24 24">

    <div class="nav-overlay" aria-hidden="true"></div>

    <script src="../../js/mobile-menu.js"></script>
    <script src="../../js/gallery-data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Read ?id= from URL
            const params  = new URLSearchParams(window.location.search);
            const eventId = params.get('id');

            const event = eventId ? getEventById(eventId) : null;

            if (!event) {
                document.getElementById('hero-title').textContent = 'Event Not Found';
                document.getElementById('photo-grid').innerHTML = `
                    <div class="no-photos">
                        <span>🔍</span>
                        <p>We couldn't find this event.</p>
                        <small><a href="../gallery.html" style="color:#2d7fa5;">← Return to Gallery</a></small>
                    </div>`;
                return;
            }

            // Update page title
            document.title = `CodeCore – ${event.title}`;

            // Hero
            document.getElementById('hero-icon').textContent  = event.icon;
            document.getElementById('hero-title').textContent = event.title;
            document.getElementById('hero-meta').innerHTML = `
                <span>📅 ${event.date}</span>
                <span>⏰ ${event.time}</span>
                <span>📍 ${event.location}</span>`;

            const photos = event.photos || [];
            const grid   = document.getElementById('photo-grid');
            const summary = document.getElementById('photos-summary');

            if (photos.length === 0) {
                summary.textContent = '';
                grid.innerHTML = `
                    <div class="no-photos">
                        <span>📷</span>
                        <p>No photos yet for this event.</p>
                        <small>Photos will be added after the event — check back soon!</small>
                    </div>`;
                return;
            }

            summary.textContent = `${photos.length} photo${photos.length !== 1 ? 's' : ''}`;

            // Build photo grid
            grid.innerHTML = photos.map((filename, i) => {
                const src = getPhotoPath(event.id, filename);
                return `
                    <div class="photo-item" data-index="${i}" tabindex="0" role="button" aria-label="Open photo ${i + 1}">
                        <img src="${src}" alt="${event.title} photo ${i + 1}" loading="lazy">
                        <div class="photo-overlay">
                            <span class="zoom-icon">🔍</span>
                        </div>
                    </div>`;
            }).join('');

            // ─── Lightbox logic ───
            const lightbox  = document.getElementById('lightbox');
            const lbImg     = document.getElementById('lb-img');
            const lbCounter = document.getElementById('lb-counter');
            let currentIndex = 0;

            function openLightbox(index) {
                currentIndex = index;
                const src = getPhotoPath(event.id, photos[currentIndex]);
                lbImg.src = src;
                lbImg.alt = `${event.title} photo ${currentIndex + 1}`;
                lbCounter.textContent = `${currentIndex + 1} / ${photos.length}`;
                lightbox.classList.add('open');
                document.body.style.overflow = 'hidden';
            }

            function closeLightbox() {
                lightbox.classList.remove('open');
                document.body.style.overflow = '';
                lbImg.src = '';
            }

            function showPrev() {
                currentIndex = (currentIndex - 1 + photos.length) % photos.length;
                openLightbox(currentIndex);
            }

            function showNext() {
                currentIndex = (currentIndex + 1) % photos.length;
                openLightbox(currentIndex);
            }

            // Click on photo
            grid.addEventListener('click', function (e) {
                const item = e.target.closest('.photo-item');
                if (item) openLightbox(parseInt(item.dataset.index));
            });
            grid.addEventListener('keydown', function (e) {
                const item = e.target.closest('.photo-item');
                if (item && (e.key === 'Enter' || e.key === ' ')) {
                    e.preventDefault();
                    openLightbox(parseInt(item.dataset.index));
                }
            });

            document.getElementById('lb-close').addEventListener('click', closeLightbox);
            document.getElementById('lb-prev').addEventListener('click', showPrev);
            document.getElementById('lb-next').addEventListener('click', showNext);

            // Click backdrop to close
            lightbox.addEventListener('click', function (e) {
                if (e.target === lightbox) closeLightbox();
            });

            // Keyboard navigation
            document.addEventListener('keydown', function (e) {
                if (!lightbox.classList.contains('open')) return;
                if (e.key === 'Escape')      closeLightbox();
                if (e.key === 'ArrowLeft')   showPrev();
                if (e.key === 'ArrowRight')  showNext();
            });
        });
    </script>
</body>
</html>
