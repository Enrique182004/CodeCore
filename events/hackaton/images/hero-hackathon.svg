<svg viewBox="0 0 520 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Laptop with code and a trophy">
  <!-- soft glow backdrop -->
  <circle cx="260" cy="215" r="185" fill="#ffffff" opacity="0.045"/>
  <circle cx="260" cy="215" r="130" fill="#ffffff" opacity="0.05"/>

  <!-- floating code symbols -->
  <text x="52" y="105" font-family="monospace" font-size="42" font-weight="900" fill="#7cb342" opacity="0.85">&lt;/&gt;</text>
  <text x="418" y="88" font-family="monospace" font-size="34" font-weight="900" fill="#2b7a9e" opacity="0.9">{ }</text>
  <text x="60" y="330" font-family="monospace" font-size="26" font-weight="900" fill="#8dc63f" opacity="0.6">;</text>
  <text x="440" y="330" font-family="monospace" font-size="24" font-weight="900" fill="#f4f8ff" opacity="0.35">( )</text>

  <!-- confetti -->
  <circle cx="105" cy="60" r="5" fill="#8dc63f"/>
  <circle cx="455" cy="150" r="6" fill="#7cb342"/>
  <circle cx="480" cy="55" r="4" fill="#2b7a9e"/>
  <circle cx="35" cy="200" r="4" fill="#2b7a9e"/>
  <circle cx="490" cy="250" r="4" fill="#f4f8ff" opacity="0.6"/>
  <rect x="150" y="35" width="9" height="9" rx="2" fill="#2b7a9e" transform="rotate(20 154 39)"/>
  <rect x="395" y="35" width="9" height="9" rx="2" fill="#8dc63f" transform="rotate(-15 399 39)"/>
  <rect x="30" y="120" width="8" height="8" rx="2" fill="#f4f8ff" opacity="0.5" transform="rotate(30 34 124)"/>

  <!-- laptop -->
  <g>
    <!-- screen -->
    <rect x="120" y="110" width="260" height="170" rx="12" fill="#0f1e31" stroke="#3a5578" stroke-width="3"/>
    <rect x="134" y="124" width="232" height="142" rx="6" fill="#152a45"/>
    <!-- window dots -->
    <circle cx="148" cy="138" r="4" fill="#e05d5d"/>
    <circle cx="162" cy="138" r="4" fill="#e8b93c"/>
    <circle cx="176" cy="138" r="4" fill="#7cb342"/>
    <!-- code lines -->
    <rect x="148" y="152" width="90" height="9" rx="4.5" fill="#7cb342"/>
    <rect x="148" y="169" width="140" height="9" rx="4.5" fill="#2b7a9e"/>
    <rect x="166" y="186" width="105" height="9" rx="4.5" fill="#f4f8ff" opacity="0.55"/>
    <rect x="166" y="203" width="130" height="9" rx="4.5" fill="#8dc63f"/>
    <rect x="166" y="220" width="80" height="9" rx="4.5" fill="#2b7a9e" opacity="0.8"/>
    <rect x="148" y="237" width="60" height="9" rx="4.5" fill="#f4f8ff" opacity="0.4"/>
    <!-- cursor -->
    <rect x="214" y="237" width="10" height="9" rx="2" fill="#8dc63f">
      <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
    </rect>
    <!-- base -->
    <path d="M100 280 L400 280 L418 306 Q420 312 412 312 L88 312 Q80 312 82 306 Z" fill="#1e3d5c" stroke="#3a5578" stroke-width="3"/>
    <rect x="215" y="286" width="70" height="10" rx="5" fill="#0f1e31"/>
  </g>

  <!-- trophy -->
  <g transform="translate(380 178)">
    <ellipse cx="48" cy="122" rx="42" ry="8" fill="#0f1e31" opacity="0.55"/>
    <path d="M18 0 H78 V34 Q78 62 48 68 Q18 62 18 34 Z" fill="#e8b93c"/>
    <path d="M18 8 H4 Q0 8 0 14 Q2 36 22 42" fill="none" stroke="#e8b93c" stroke-width="7" stroke-linecap="round"/>
    <path d="M78 8 H92 Q96 8 96 14 Q94 36 74 42" fill="none" stroke="#e8b93c" stroke-width="7" stroke-linecap="round"/>
    <rect x="41" y="66" width="14" height="18" fill="#c99a28"/>
    <rect x="26" y="84" width="44" height="12" rx="3" fill="#e8b93c"/>
    <rect x="20" y="96" width="56" height="14" rx="3" fill="#c99a28"/>
    <path d="M40 18 L48 8 L56 18 L48 28 Z" fill="#fff3cf"/>
  </g>

  <!-- lightning bolt -->
  <path d="M92 235 L112 235 L100 262 L124 258 L88 300 L98 268 L78 270 Z" fill="#8dc63f" opacity="0.9"/>
</svg>
