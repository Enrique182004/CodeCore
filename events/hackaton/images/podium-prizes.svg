<svg viewBox="0 0 520 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Winners podium with trophy and confetti">
  <!-- confetti -->
  <circle cx="60" cy="40" r="5" fill="#8dc63f"/>
  <circle cx="470" cy="60" r="5" fill="#7cb342"/>
  <circle cx="420" cy="24" r="4" fill="#f4f8ff" opacity="0.7"/>
  <circle cx="110" cy="90" r="4" fill="#f4f8ff" opacity="0.5"/>
  <circle cx="30" cy="150" r="4" fill="#4a9fc9"/>
  <circle cx="492" cy="150" r="4" fill="#8dc63f"/>
  <rect x="140" y="30" width="9" height="9" rx="2" fill="#4a9fc9" transform="rotate(24 144 34)"/>
  <rect x="360" y="40" width="9" height="9" rx="2" fill="#8dc63f" transform="rotate(-18 364 44)"/>
  <rect x="480" y="110" width="8" height="8" rx="2" fill="#f4f8ff" opacity="0.5" transform="rotate(30 484 114)"/>
  <rect x="40" y="100" width="8" height="8" rx="2" fill="#8dc63f" transform="rotate(-25 44 104)"/>
  <path d="M258 16 l4 9 10 1 -7 7 2 10 -9 -5 -9 5 2 -10 -7 -7 10 -1 Z" fill="#e8b93c"/>

  <!-- trophy above first place -->
  <g transform="translate(222 52)">
    <path d="M12 0 H64 V28 Q64 50 38 56 Q12 50 12 28 Z" fill="#e8b93c"/>
    <path d="M12 6 H2 Q-2 6 -2 11 Q0 28 16 34" fill="none" stroke="#e8b93c" stroke-width="6" stroke-linecap="round"/>
    <path d="M64 6 H74 Q78 6 78 11 Q76 28 60 34" fill="none" stroke="#e8b93c" stroke-width="6" stroke-linecap="round"/>
    <rect x="31" y="54" width="14" height="14" fill="#c99a28"/>
    <rect x="20" y="68" width="36" height="10" rx="3" fill="#e8b93c"/>
    <path d="M31 14 L38 6 L45 14 L38 22 Z" fill="#fff3cf"/>
  </g>

  <!-- podium -->
  <g font-family="Segoe UI, sans-serif" font-weight="900" text-anchor="middle">
    <!-- 2nd -->
    <rect x="118" y="200" width="94" height="84" rx="6" fill="#2b7a9e"/>
    <text x="165" y="252" font-size="40" fill="#ffffff">2</text>
    <!-- 1st -->
    <rect x="212" y="166" width="96" height="118" rx="6" fill="#7cb342"/>
    <text x="260" y="232" font-size="46" fill="#ffffff">1</text>
    <!-- 3rd -->
    <rect x="308" y="224" width="94" height="60" rx="6" fill="#3a5578"/>
    <text x="355" y="266" font-size="34" fill="#ffffff">3</text>
  </g>

  <!-- ground line -->
  <rect x="70" y="284" width="380" height="6" rx="3" fill="#0f1e31" opacity="0.6"/>
</svg>
